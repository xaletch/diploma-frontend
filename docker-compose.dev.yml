services:
  backend:
    image: xaletch/diplome-backend-crm:${IMAGE_VERSION}
    platform: linux/amd64
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.development
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  postgres:
    container_name: postgres-container
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5434:5432"
    env_file:
      - .env.development
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend

  redis:
    container_name: redis-container
    image: redis:8.2.2
    restart: always
    ports:
      - "6379:6379"
    env_file:
      - .env.development
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server --console-address ":9001" /data/
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - minio-storage:/data
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio-storage:
    name: minio-storage
